# Nginx для раздачи статики SPA (Vite build) и config.json
server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # config.json — запрос приложения к API (backendUrl)
    location = /config.json {
        add_header Cache-Control "no-store";
    }

    # Админ-панели (отдельные точки входа)
    location = /admin-carwash {
        try_files /admin-carwash.html =404;
    }
    location = /system-admin {
        try_files /system-admin.html =404;
    }

    # SPA: все остальные пути — index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кэш статики (JS/CSS с хешем в имени)
    location ~* \.(js|css|ico|png|jpg|jpeg|gif|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
